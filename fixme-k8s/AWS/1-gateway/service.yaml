apiVersion: v1
kind: Service
metadata:
  name: fixme-gateway
  namespace: production
  annotations:
    external-dns.alpha.kubernetes.io/hostname: api.fixmeapp.xyz
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: ClusterIP
  selector:
    app: fixme-gateway
  ports:
  - name: gateway
    port: 4000
    targetPort: 4000
    protocol: TCP
