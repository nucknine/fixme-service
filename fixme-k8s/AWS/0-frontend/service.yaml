apiVersion: v1
kind: Service
metadata:
  name: fixme-frontend
  namespace: production
  annotations:
    external-dns.alpha.kubernetes.io/hostname: fixmeapp.live
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: ClusterIP
  selector:
    app: fixme-frontend
  ports:
  - name: frontend
    port: 80
    targetPort: frontend
    protocol: TCP
